<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Impact TV | TradePulse</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #050000;
            --red-glow: #ff0000;
            --glass: rgba(255, 0, 0, 0.05);
            --border: rgba(255, 0, 0, 0.2);
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1a0000 0%, #050000 100%);
            color: white; height: 100vh; display: flex; overflow: hidden;
        }

        .sidebar {
            width: 90px; background: rgba(0,0,0,0.9); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding: 20px 0;
        }

        .logo-area { color: var(--red-glow); font-size: 1.8rem; margin-bottom: 40px; filter: drop-shadow(0 0 10px var(--red-glow)); }

        .menu-item {
            width: 55px; height: 55px; border-radius: 15px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
            color: #444; transition: 0.3s; cursor: pointer;
        }

        .main-content { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 25px; overflow-y: auto; }

        .player-container {
            width: 100%; height: 50vh; background: #000; border-radius: 25px;
            position: relative; overflow: hidden; border: 1px solid var(--border);
            flex-shrink: 0;
        }

        #player { width: 100%; height: 100%; }

        .glass-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: rgba(0,0,0,0.85);
            z-index: 5; pointer-events: none;
        }

        .section-title { border-left: 4px solid var(--red-glow); padding-left: 15px; font-size: 1.3rem; margin-bottom: 10px; }
        .section-title span { color: var(--red-glow); font-weight: bold; }

        .channels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding-bottom: 20px; }

        .channel-card {
            background: var(--glass); border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; text-align: center;
            backdrop-filter: blur(10px); transition: 0.3s; cursor: pointer;
        }

        .channel-card i { font-size: 1.8rem; color: var(--red-glow); margin-bottom: 10px; display: block; }

        .channel-card:focus, .channel-card:hover {
            outline: none; background: rgba(255,0,0,0.2);
            border-color: var(--red-glow); transform: scale(1.05);
            box-shadow: 0 0 20px var(--red-glow);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area"><i class="fas fa-bolt"></i></div>
        <div class="menu-item" tabindex="0"><i class="fas fa-home"></i></div>
        <div class="menu-item" tabindex="0"><i class="fas fa-tv"></i></div>
    </nav>

    <main class="main-content">
        <div class="player-container">
            <div id="player"></div>
            <div id="placeholder" class="glass-overlay">
                <i class="fas fa-play-circle" style="font-size: 4rem; color: #ff0000; margin-bottom: 15px;"></i>
                <p>SELECIONE UM CANAL PARA INICIAR</p>
            </div>
        </div>

        <div class="channels-section">
            <h2 class="section-title">CANAIS <span>AO VIVO 24H</span></h2>
            <div class="channels-grid" id="channelsGrid"></div>
        </div>
    </main>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const channels = [
            { name: "SBT News", id: "iS7I_6R_o2o" },
            { name: "Record News", id: "Y-8Z59PjJvU" },
            { name: "Jovem Pan", id: "VIsidpY_wlo" },
            { name: "Band Jornalismo", id: "2nS_3Gv8_0Y" },
            { name: "NASA TV", id: "21X5lGlDOfg" }
        ];

        let ytPlayer;

        function onYouTubeIframeAPIReady() {
            const grid = document.getElementById('channelsGrid');
            channels.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.tabIndex = 0;
                card.innerHTML = `<i class="fas fa-play-circle"></i><div>${ch.name}</div>`;
                
                const play = () => {
                    document.getElementById('placeholder').style.display = 'none';
                    if (ytPlayer) {
                        ytPlayer.loadVideoById(ch.id);
                    } else {
                        ytPlayer = new YT.Player('player', {
                            videoId: ch.id,
                            playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1 }
                        });
                    }
                };

                card.onclick = play;
                card.onkeydown = (e) => e.key === 'Enter' && play();
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
